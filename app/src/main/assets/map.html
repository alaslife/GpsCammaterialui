<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body, html, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #131316;
        }
        /* Custom styling to match modern material look */
        .leaflet-container {
            background-color: #131316 !important;
        }
        /* Hide leaflet attribution for a cleaner look */
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([0, 0], 2);

        var currentTileLayer = null;
        var markerClusterGroup = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 40
        });
        map.addLayer(markerClusterGroup);

        var markersMap = {}; // Map of photoId -> marker

        // Tile layer definitions (using free unauthenticated servers)
        var tileLayers = {
            normal: "https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",
            satellite: "https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
            hybrid: "https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
            terrain: "https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}",
            dark: "https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
            grey: "https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"
        };

        function setMapType(type) {
            var url = tileLayers[type] || tileLayers.normal;
            if (currentTileLayer) {
                map.removeLayer(currentTileLayer);
            }
            currentTileLayer = L.tileLayer(url, {
                maxZoom: 20
            }).addTo(map);
        }

        // Initialize default style
        setMapType('normal');

        // Handle Map click to clear selection
        map.on('click', function() {
            if (window.AndroidInterface) {
                window.AndroidInterface.onMapClick();
            }
        });

        // Interface to update the markers
        function updateMarkers(photosJson) {
            markerClusterGroup.clearLayers();
            markersMap = {};
            
            try {
                var photos = JSON.parse(photosJson);
                if (photos.length === 0) return;

                var bounds = L.latLngBounds();

                photos.forEach(function(photo) {
                    var marker = L.marker([photo.latitude, photo.longitude]);
                    
                    marker.on('click', function(e) {
                        L.DomEvent.stopPropagation(e);
                        if (window.AndroidInterface) {
                            window.AndroidInterface.onMarkerClick(photo.id);
                        }
                    });

                    markerClusterGroup.addLayer(marker);
                    markersMap[photo.id] = marker;
                    bounds.extend(marker.getLatLng());
                });

                // Auto-fit to bounds if multiple markers exist
                if (photos.length > 0) {
                    map.fitBounds(bounds, { padding: [50, 50] });
                }
            } catch (e) {
                console.error("Failed to parse markers: " + e);
            }
        }

        // Interface to center map on a specific coordinate
        function centerOn(lat, lng, zoom) {
            map.setView([lat, lng], zoom || 15);
        }

        // Interface to select/highlight a marker
        function selectMarker(photoId) {
            var marker = markersMap[photoId];
            if (marker) {
                // If it is in a cluster, zoom in to expand it
                var visibleParent = markerClusterGroup.getVisibleParent(marker);
                if (visibleParent && visibleParent !== marker) {
                    markerClusterGroup.zoomToShowLayer(marker, function() {
                        map.setView(marker.getLatLng(), 17);
                    });
                } else {
                    map.setView(marker.getLatLng(), 17);
                }
            }
        }
    </script>
</body>
</html>
